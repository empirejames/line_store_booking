<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時間點熱度分析</title>
  <!-- 載入 Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- 載入 Google Fonts -->
  <link href="https://fonts.googleapis.css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --accent-primary: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    .month-selector {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      display: block;
      margin: 15px auto 0 auto;
    }
    .month-selector option {
      background: var(--bg-dark);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 600px;
      text-align: center;
      margin-bottom: 30px;
      padding-top: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 10px 0;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin: 0;
    }

    .chart-container {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .scrollable-wrapper {
      width: 100%;
      height: 70vh; /* 動態高度，可用滾動條 */
      overflow-y: auto;
      border-radius: 10px;
    }
    
    .canvas-container {
      position: relative;
      width: 100%;
    }

    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      color: #ef4444;
      text-align: center;
      margin-top: 20px;
      font-weight: 600;
    }

  </style>
</head>
<body>

  <header>
    <h1>客流熱度分佈</h1>
    <p class="subtitle">各時段交易數量趨勢</p>
    <select class="month-selector" id="monthSelect">
      <option value="一月">一月</option>
      <option value="二月">二月</option>
      <option value="三月">三月</option>
      <option value="四月">四月</option>
      <option value="五月">五月</option>
      <option value="六月">六月</option>
      <option value="七月">七月</option>
      <option value="八月">八月</option>
      <option value="九月">九月</option>
      <option value="十月">十月</option>
      <option value="十一月">十一月</option>
      <option value="十二月">十二月</option>
    </select>
  </header>

  <div class="chart-container">
    <div id="loading" class="loading-overlay">
      <div class="spinner"></div>
      <p style="margin-top: 15px; color: var(--text-muted); font-size: 14px;">資料載入中...</p>
    </div>
    <div id="error" class="error-msg" style="display: none;"></div>
    
    <div class="scrollable-wrapper">
      <div id="canvasWrapper" class="canvas-container">
        <canvas id="timeChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    // 您的 Google Apps Script 網頁應用程式 URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxCqGQ2jc__cqcYtfHUI-2PBRZFoHWALGkvVW8RAzJaQ6V2K3lJfIMMfZbi5TBVWfVM/exec';

    let timeChartInstance = null;
    const monthSelect = document.getElementById('monthSelect');
    
    // 預設為當前月份
    const currentMonthNum = new Date().getMonth();
    monthSelect.selectedIndex = currentMonthNum;

    monthSelect.addEventListener('change', (e) => {
      fetchAndRenderChart(e.target.value);
    });

    async function fetchAndRenderChart(month) {
      const loading = document.getElementById('loading');
      const errorDiv = document.getElementById('error');
      
      loading.style.display = 'flex';
      errorDiv.style.display = 'none';
      document.getElementById('canvasWrapper').style.opacity = '0.3';
      
      try {
        const response = await fetch(`${GAS_URL}?action=getTimeDistribution&month=${encodeURIComponent(month)}`);
        const result = await response.json();
        
        if (result.status === 'success' && result.data && result.data.length > 0) {
          loading.style.display = 'none';
          
          // 準備資料
          const labels = result.data.map(item => item.time);
          const dataPoints = result.data.map(item => item.transactions);
          
          renderChart(labels, dataPoints);
        } else {
          loading.style.display = 'none';
          errorDiv.style.display = 'block';
          errorDiv.textContent = '找不到交易資料或表格格式有誤。';
        }
      } catch (err) {
        loading.style.display = 'none';
        errorDiv.style.display = 'block';
        errorDiv.textContent = '網路連線失敗，請稍後再試。';
        console.error(err);
      }
    }

    function renderChart(labels, dataPoints) {
      // 根據資料筆數動態設定高度 (每筆資料給予 30px 空間，最少 400px)
      const dynamicHeight = Math.max(400, labels.length * 30);
      document.getElementById('canvasWrapper').style.height = dynamicHeight + 'px';

      const ctx = document.getElementById('timeChart').getContext('2d');
      
      // 建立漸層背景 (由左至右)
      const gradient = ctx.createLinearGradient(0, 0, 400, 0);
      gradient.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
      gradient.addColorStop(1, 'rgba(59, 130, 246, 0.8)');

      if (timeChartInstance) {
        timeChartInstance.destroy();
      }

      document.getElementById('canvasWrapper').style.opacity = '1';

      timeChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: '交易數量',
            data: dataPoints,
            backgroundColor: gradient,
            borderRadius: 4,
            borderWidth: 0,
            barThickness: 15 // 長條粗細
          }]
        },
        options: {
          indexAxis: 'y', // 翻轉成橫向長條圖
          responsive: true,
          maintainAspectRatio: false, // 讓高度可以自適應
          plugins: {
            legend: {
              display: false // 隱藏圖例
            },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.9)',
              titleColor: '#94a3b8',
              bodyColor: '#f8fafc',
              borderColor: 'rgba(255,255,255,0.1)',
              borderWidth: 1,
              padding: 12,
              displayColors: false,
              callbacks: {
                label: function(context) {
                  return `交易量: ${context.parsed.x} 筆`;
                }
              }
            }
          },
          scales: {
            x: {
              beginAtZero: true,
              grid: {
                color: 'rgba(255, 255, 255, 0.05)',
                drawBorder: false
              },
              ticks: {
                color: '#94a3b8',
                stepSize: Math.ceil(Math.max(...dataPoints) / 5) || 1
              }
            },
            y: {
              grid: {
                color: 'rgba(255, 255, 255, 0.05)',
                drawBorder: false
              },
              ticks: {
                color: '#94a3b8'
              }
            }
          }
        }
      });
    }

    // 啟動
    fetchAndRenderChart(monthSelect.value);
  </script>
</body>
</html>
